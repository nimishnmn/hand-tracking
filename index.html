<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holistic Vision Tracker</title>
  <meta name="description" content="Minimalist web-based hand tracking using MediaPipe Tasks Vision API.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Single flat start button in the center -->
  <button id="start-camera-btn">Start</button>

  <!-- Percentage progress bar loader -->
  <div id="loading-container">
    <div id="loading-text">Loading: 0%</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
  </div>

  <!-- On-screen controls for mobile/phone users -->
  <div id="control-bar">
    <button id="btn-pose" class="control-btn">Pose [P]</button>
    <button id="btn-hands" class="control-btn">Hands [H]</button>
    <button id="btn-fliph" class="control-btn">Flip H [X]</button>
    <button id="btn-flipv" class="control-btn">Flip V [Y]</button>
    <button id="btn-quit" class="control-btn quit-btn">Quit [Esc]</button>
  </div>

  <!-- Top-right preset controls -->
  <div id="preset-selector">
    <button id="preset-1" class="preset-btn active">1</button>
    <button id="preset-2" class="preset-btn">2</button>
    <button id="preset-3" class="preset-btn">3</button>
    <button id="preset-4" class="preset-btn">4</button>
    <button id="preset-5" class="preset-btn">5</button>
    <button id="preset-6" class="preset-btn">6</button>
  </div>

  <!-- Outline toggle for Preset 3 -->
  <button id="btn-outline" class="control-btn">Outline [O]</button>

  <!-- Right-side video/image controller panel for Preset 6 -->
  <div id="preset6-panel">
    <div id="preset6-preview-container">
      <div style="color: #666; font-size: 12px; height: 100%; display: flex; align-items: center; justify-content: center;">No file selected</div>
    </div>
    <div class="preset6-input-row">
      <input type="file" id="preset6-file-input" accept="video/*,image/*" style="display: none;">
      <button id="preset6-choose-btn" class="control-btn" style="width: 100%;">Choose File</button>
    </div>
    <div class="preset6-input-row" style="margin-top: 5px;">
      <button id="preset6-fliph-btn" class="control-btn" style="flex: 1; font-size: 11px;">Flip H</button>
      <button id="preset6-flipv-btn" class="control-btn" style="flex: 1; font-size: 11px;">Flip V</button>
    </div>
    <div class="preset6-input-row" style="margin-top: 8px; flex-direction: column; gap: 4px; align-items: flex-start;">
      <label style="font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px;">Tracking Mode</label>
      <div style="display: flex; gap: 4px; width: 100%;">
        <button id="preset6-mode-hand" class="control-btn active" style="flex: 1; font-size: 10px; padding: 8px 0; letter-spacing: 0.5px;">Hand</button>
        <button id="preset6-mode-fingers" class="control-btn" style="flex: 1; font-size: 10px; padding: 8px 0; letter-spacing: 0.5px;">Fingers</button>
        <button id="preset6-mode-pinch" class="control-btn" style="flex: 1; font-size: 10px; padding: 8px 0; letter-spacing: 0.5px;">Pinch</button>
        <button id="preset6-mode-3d" class="control-btn" style="flex: 1; font-size: 10px; padding: 8px 0; letter-spacing: 0.5px;">3D</button>
      </div>
    </div>
  </div>

  <!-- Left-side Universal Options panel -->
  <div id="universal-panel">
    <div class="panel-title">Options</div>
    <button id="btn-unlimited-fps" class="control-btn" style="width: 100%; font-size: 11px; padding: 10px 0;">Unlimited FPS</button>
  </div>

  <!-- Fullscreen Canvas container -->
  <div id="canvas-container">
    <canvas id="output-canvas" width="1280" height="720"></canvas>
    <!-- Overlay container for corner pinned video/iframe (aligned in JS to canvas boundaries) -->
    <div id="preset6-overlay-container" style="position: absolute; pointer-events: none; z-index: 10; display: none; overflow: hidden; transform-origin: 0 0;"></div>
  </div>

  <!-- Hidden video stream input -->
  <video id="webcam" width="1280" height="720" autoplay playsinline muted style="display:none"></video>

  <script src="app.js?v=20260620_0605"></script>
</body>
</html>
